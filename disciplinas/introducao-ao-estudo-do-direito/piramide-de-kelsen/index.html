<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pirâmide de Kelsen - Ordenamento Jurídico Brasileiro</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #1b1209;
      color: #f8fafc;
      --panel-bg: rgba(37, 29, 21, 0.74);
      --panel-strong: rgba(26, 23, 19, 0.94);
      --line: rgba(245, 222, 179, 0.2);
      --text: #f8fafc;
      --muted: #ead9b9;
      --blue: #62c7ff;
      --teal: #4dd0e1;
      --gold: #ffd978;
      --ruby: #fb7185;
      --green: #79d3a7;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
    }

    body {
      background:
        radial-gradient(circle at 24% 12%, rgba(177, 130, 54, 0.28), transparent 28rem),
        radial-gradient(circle at 82% 8%, rgba(99, 65, 24, 0.24), transparent 24rem),
        linear-gradient(180deg, #2b1c0f 0%, #1b1209 54%, #0d0805 100%);
    }

    #scene {
      position: fixed;
      inset: 0;
    }

    .hud {
      position: fixed;
      top: clamp(14px, 2vw, 26px);
      left: clamp(14px, 2vw, 28px);
      z-index: 3;
      width: min(410px, calc(100vw - 28px));
      padding-left: 14px;
      pointer-events: none;
      text-shadow: 0 2px 16px rgba(0, 0, 0, 0.75);
    }

    .hud::before {
      content: "";
      position: absolute;
      left: 0;
      top: 2px;
      width: 3px;
      height: calc(100% - 4px);
      border-radius: 999px;
      background: linear-gradient(180deg, var(--gold), var(--teal));
      box-shadow: 0 0 26px rgba(255, 217, 120, 0.34);
    }

    .hud h1 {
      margin: 0;
      font-size: clamp(1.2rem, 2.3vw, 2.24rem);
      font-weight: 760;
      line-height: 1.03;
      letter-spacing: 0;
    }

    .hud p {
      margin: 8px 0 0;
      max-width: 32rem;
      color: var(--muted);
      font-size: clamp(0.74rem, 1vw, 0.95rem);
      line-height: 1.45;
    }

    .label {
      width: clamp(150px, 17vw, 236px);
      padding: 8px 10px;
      border: 1px solid rgba(226, 232, 240, 0.14);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.025)),
        rgba(7, 11, 18, 0.72);
      box-shadow: 0 18px 42px rgba(0, 0, 0, 0.42);
      color: #f8fafc;
      font-size: clamp(0.58rem, 0.82vw, 0.78rem);
      font-weight: 650;
      line-height: 1.25;
      text-align: center;
      white-space: pre-line;
      backdrop-filter: blur(10px);
      border-radius: 7px;
    }

    .level-label {
      width: clamp(252px, 27vw, 390px);
      padding: 0;
      border: 0;
      background: transparent;
      box-shadow: none;
      backdrop-filter: none;
      pointer-events: none;
      transform: translateY(-50%);
    }

    .level-label::before {
      content: "";
      display: none;
      width: 38px;
      height: 2px;
      margin: 0 auto 6px;
      border-radius: 999px;
      background: var(--accent, var(--teal));
      box-shadow: 0 0 18px color-mix(in srgb, var(--accent, var(--teal)) 48%, transparent);
    }

    .level-label[data-layer="infralegal"] {
      --accent: var(--blue);
    }

    .level-label[data-layer="legal"] {
      --accent: var(--green);
    }

    .level-label[data-layer="supralegal"] {
      --accent: var(--ruby);
    }

    .level-label[data-layer="constitucional"] {
      --accent: var(--gold);
    }

    .level-title {
      display: none;
      margin-bottom: 6px;
      color: color-mix(in srgb, var(--accent, var(--teal)) 72%, #ffffff);
      font-size: 0.72rem;
      font-weight: 860;
      line-height: 1.18;
      text-transform: uppercase;
      text-shadow:
        0 1px 1px rgba(0, 0, 0, 0.85),
        0 0 18px color-mix(in srgb, var(--accent, var(--teal)) 42%, transparent);
    }

    .norm-stack {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 7px;
      pointer-events: none;
    }

    .norm-chip {
      min-height: 28px;
      border: 1px solid rgba(226, 232, 240, 0.16);
      border-radius: 7px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.09), rgba(255, 255, 255, 0.015)),
        rgba(10, 16, 28, 0.82);
      color: #f8fafc;
      cursor: pointer;
      font: inherit;
      font-size: 0.65rem;
      font-weight: 760;
      line-height: 1.08;
      padding: 6px 9px;
      pointer-events: auto;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08), 0 8px 14px rgba(0, 0, 0, 0.24);
      transition: background 160ms ease, border-color 160ms ease, transform 160ms ease, color 160ms ease, box-shadow 160ms ease;
    }

    .norm-chip:hover,
    .norm-chip:focus-visible {
      border-color: color-mix(in srgb, var(--accent, var(--gold)) 72%, white);
      background:
        linear-gradient(180deg, color-mix(in srgb, var(--accent, var(--gold)) 22%, transparent), rgba(255, 255, 255, 0.02)),
        rgba(15, 23, 42, 0.92);
      color: #fff7d6;
      outline: none;
      transform: translateY(-1px);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.12), 0 14px 24px rgba(0, 0, 0, 0.3);
    }

    .norm-chip.active {
      border-color: color-mix(in srgb, var(--accent, var(--teal)) 78%, white);
      background:
        linear-gradient(180deg, color-mix(in srgb, var(--accent, var(--teal)) 32%, transparent), rgba(255, 255, 255, 0.025)),
        rgba(10, 23, 32, 0.96);
      color: #ffffff;
      box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent, var(--teal)) 20%, transparent), 0 16px 34px rgba(0, 0, 0, 0.36);
    }

    .loading {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      z-index: 2;
      color: #fff8e8;
      font-size: 0.9rem;
      letter-spacing: 0;
      background: #1b1209;
      transition: opacity 220ms ease;
    }

    .loading.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .scheme-panel {
      position: fixed;
      top: clamp(14px, 2vw, 26px);
      right: clamp(14px, 2vw, 28px);
      z-index: 4;
      width: min(318px, calc(100vw - 28px));
      padding: 12px 13px;
      border: 1px solid rgba(255, 217, 120, 0.24);
      border-radius: 8px;
      background:
        linear-gradient(135deg, rgba(255, 217, 120, 0.08), rgba(77, 208, 225, 0.04)),
        var(--panel-bg);
      box-shadow: 0 18px 46px rgba(0, 0, 0, 0.42);
      backdrop-filter: blur(16px);
    }

    .scheme-panel::after {
      content: "";
      position: absolute;
      left: 12px;
      right: 12px;
      bottom: -1px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255, 217, 120, 0.72), transparent);
    }

    .scheme-kicker {
      margin: 0 0 5px;
      color: #ffe3a3;
      font-size: 0.68rem;
      font-weight: 760;
      line-height: 1.1;
      text-transform: uppercase;
    }

    .scheme-panel h2 {
      margin: 0;
      color: #f8fafc;
      font-size: 1.02rem;
      line-height: 1.12;
    }

    .scheme-note {
      margin: 7px 0 0;
      color: #c7d2fe;
      font-size: 0.68rem;
      line-height: 1.32;
    }

    .study-player {
      position: fixed;
      top: clamp(14px, 2vw, 26px);
      left: 50%;
      z-index: 4;
      display: grid;
      grid-template-columns: 38px minmax(0, 1fr) 30px;
      align-items: center;
      gap: 9px;
      width: min(338px, 32vw);
      min-width: 248px;
      padding: 8px 9px;
      border: 1px solid rgba(255, 217, 120, 0.28);
      border-radius: 999px;
      background:
        linear-gradient(135deg, rgba(255, 217, 120, 0.12), rgba(77, 208, 225, 0.05)),
        rgba(26, 23, 19, 0.78);
      box-shadow: 0 18px 46px rgba(0, 0, 0, 0.42);
      backdrop-filter: blur(16px);
      transform: translateX(-50%);
    }

    .study-player button {
      display: inline-grid;
      place-items: center;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 999px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.02)),
        rgba(15, 23, 42, 0.78);
      color: #fff7d6;
      cursor: pointer;
      line-height: 1;
      transition: background 160ms ease, border-color 160ms ease, transform 160ms ease;
    }

    .study-player button:hover,
    .study-player button:focus-visible {
      border-color: rgba(255, 217, 120, 0.6);
      background:
        linear-gradient(180deg, rgba(255, 217, 120, 0.18), rgba(255, 255, 255, 0.03)),
        rgba(20, 24, 31, 0.92);
      outline: none;
      transform: translateY(-1px);
    }

    .study-play {
      width: 38px;
      height: 38px;
      font-size: 0.94rem;
      font-weight: 900;
    }

    .study-next {
      width: 30px;
      height: 30px;
      font-size: 1.18rem;
      font-weight: 800;
    }

    .study-meta {
      min-width: 0;
    }

    .study-kicker,
    .study-title {
      overflow: hidden;
      margin: 0;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .study-kicker {
      color: #ffe3a3;
      font-size: 0.58rem;
      font-weight: 820;
      line-height: 1.08;
      text-transform: uppercase;
    }

    .study-title {
      margin-top: 3px;
      color: #f8fafc;
      font-size: 0.74rem;
      font-weight: 740;
      line-height: 1.12;
    }

    .study-player[data-state="playing"] {
      border-color: rgba(77, 208, 225, 0.42);
      box-shadow:
        0 18px 46px rgba(0, 0, 0, 0.42),
        0 0 26px rgba(77, 208, 225, 0.14);
    }

    .connector-layer {
      position: fixed;
      inset: 0;
      z-index: 5;
      width: 100vw;
      height: 100vh;
      overflow: visible;
      pointer-events: none;
    }

    .connector-line {
      opacity: 0;
      fill: none;
      stroke: rgba(255, 214, 120, 0.86);
      stroke-width: 2;
      stroke-linecap: round;
      stroke-dasharray: 4 8;
      filter: drop-shadow(0 0 8px rgba(255, 214, 120, 0.55));
      transition: opacity 160ms ease;
    }

    .connector-layer.active .connector-line {
      opacity: 1;
    }

    .detail-panel {
      position: fixed;
      top: 146px;
      right: clamp(14px, 2vw, 28px);
      z-index: 6;
      width: min(380px, calc(100vw - 28px));
      max-height: min(58vh, 560px);
      overflow: auto;
      border: 1px solid rgba(77, 208, 225, 0.3);
      border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(77, 208, 225, 0.07), rgba(255, 255, 255, 0.018) 28%),
        var(--panel-strong);
      box-shadow: 0 22px 60px rgba(0, 0, 0, 0.48);
      color: #f8fafc;
      opacity: 0;
      pointer-events: none;
      transform: translateY(8px) scale(0.985);
      transition: opacity 180ms ease, transform 180ms ease;
      backdrop-filter: blur(16px);
      scrollbar-color: rgba(148, 163, 184, 0.45) transparent;
    }

    .detail-panel.open {
      opacity: 1;
      pointer-events: auto;
      transform: none;
    }

    .detail-header {
      display: grid;
      grid-template-columns: 1fr max-content;
      gap: 10px;
      padding: 13px 14px 10px;
      border-bottom: 1px solid var(--line);
    }

    .detail-level {
      color: #93c5fd;
      font-size: 0.68rem;
      font-weight: 780;
      line-height: 1.2;
      text-transform: uppercase;
    }

    .detail-title {
      margin: 4px 0 0;
      color: #fff7d6;
      font-size: 1.08rem;
      line-height: 1.15;
    }

    .detail-status {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      align-self: start;
      min-height: 24px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 999px;
      color: #e0fbff;
      background: rgba(77, 208, 225, 0.15);
      font-size: 0.66rem;
      font-weight: 780;
      padding: 4px 8px;
      white-space: nowrap;
    }

    .detail-status[data-state="warning"] {
      color: #ffedc2;
      background: rgba(255, 196, 87, 0.14);
      border-color: rgba(255, 196, 87, 0.34);
    }

    .detail-status[data-state="inactive"] {
      color: #fecaca;
      background: rgba(239, 68, 68, 0.14);
      border-color: rgba(239, 68, 68, 0.34);
    }

    .detail-close {
      width: 28px;
      height: 28px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 7px;
      background: rgba(15, 23, 42, 0.72);
      color: #f8fafc;
      cursor: pointer;
      font-size: 1.1rem;
      line-height: 1;
      margin-bottom: 8px;
      transition: background 160ms ease, border-color 160ms ease;
    }

    .detail-close:hover,
    .detail-close:focus-visible {
      border-color: rgba(255, 217, 120, 0.55);
      background: rgba(255, 217, 120, 0.12);
      outline: none;
    }

    .detail-body {
      display: grid;
      gap: 0;
      padding: 4px 14px 14px;
    }

    .detail-section {
      position: relative;
      padding: 10px 0;
      border-bottom: 1px solid rgba(148, 163, 184, 0.13);
    }

    .detail-section:last-child {
      border-bottom: 0;
      padding-bottom: 3px;
    }

    .detail-section h3 {
      margin: 0 0 5px;
      color: #c7d2fe;
      font-size: 0.72rem;
      line-height: 1.2;
      text-transform: uppercase;
    }

    .detail-section p,
    .detail-section li {
      color: #e5e7eb;
      font-size: 0.74rem;
      line-height: 1.38;
    }

    .detail-section p {
      margin: 0;
    }

    .detail-section ul {
      margin: 0;
      padding-left: 1rem;
    }

    .detail-section li + li {
      margin-top: 4px;
    }

    @media (max-width: 640px) {
      .hud {
        top: 12px;
        left: 12px;
        width: min(178px, calc(100vw - 24px));
        padding-left: 11px;
      }

      .hud h1 {
        font-size: 0.98rem;
        line-height: 1.05;
      }

      .hud p {
        margin-top: 6px;
        font-size: 0.7rem;
        line-height: 1.36;
      }

      .label {
        width: min(138px, 35vw);
        padding: 5px 6px;
        font-size: 0.54rem;
        line-height: 1.18;
      }

      .level-label {
        width: min(315px, 82vw);
        padding: 0;
      }

      .level-label::before {
        width: 32px;
        margin-bottom: 5px;
      }

      .level-title {
        margin-bottom: 5px;
        font-size: 0.56rem;
      }

      .norm-stack {
        gap: 5px;
      }

      .norm-chip {
        min-height: 22px;
        padding: 4px 5px;
        font-size: 0.5rem;
        border-radius: 6px;
      }

      .scheme-panel {
        top: 12px;
        right: 12px;
        bottom: auto;
        width: 180px;
        padding: 8px;
      }

      .scheme-kicker {
        margin-bottom: 4px;
        font-size: 0.58rem;
      }

      .scheme-panel h2 {
        font-size: 0.78rem;
      }

      .scheme-note {
        font-size: 0.58rem;
      }

      .study-player {
        top: 126px;
        grid-template-columns: 34px minmax(0, 1fr) 28px;
        gap: 7px;
        width: min(248px, calc(100vw - 24px));
        min-width: 0;
        padding: 7px;
      }

      .study-play {
        width: 34px;
        height: 34px;
        font-size: 0.82rem;
      }

      .study-next {
        width: 28px;
        height: 28px;
      }

      .study-kicker {
        font-size: 0.5rem;
      }

      .study-title {
        font-size: 0.62rem;
      }

      .detail-panel {
        top: auto;
        right: 12px;
        bottom: 10px;
        left: 12px;
        width: auto;
        max-height: 31vh;
      }

      .detail-header {
        padding: 12px 12px 9px;
      }

      .detail-body {
        padding: 4px 12px 12px;
      }

      .detail-title {
        font-size: 0.9rem;
      }

      .detail-status {
        font-size: 0.58rem;
        min-height: 22px;
      }

      .detail-section {
        padding: 8px 0;
      }

      .detail-section p,
      .detail-section li {
        font-size: 0.68rem;
      }
    }
  </style>
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.184.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <main id="scene" aria-label="Pirâmide de Kelsen em 3D"></main>
  <section class="hud" aria-hidden="true">
    <h1>Pirâmide de Kelsen</h1>
    <p>Ordenamento jurídico brasileiro com a Grundnorm no vértice da pirâmide irradiando sobre as normas inferiores.</p>
  </section>
  <section class="scheme-panel" aria-label="Esquema da pirâmide normativa">
    <p class="scheme-kicker">Ordenamento jurídico</p>
    <h2>Compreensão geral do STF</h2>
    <p class="scheme-note" id="schemeNote"></p>
  </section>
  <section class="study-player" id="studyPlayer" aria-label="Leitura guiada em áudio" data-state="idle">
    <button class="study-play" id="studyPlay" type="button" aria-label="Reproduzir leitura guiada">
      <span id="studyPlayIcon" aria-hidden="true">▶</span>
    </button>
    <div class="study-meta">
      <p class="study-kicker" id="studyAudioMode">Áudio guia</p>
      <p class="study-title" id="studyAudioTitle">Ouvir estudo completo</p>
    </div>
    <button class="study-next" id="studyNext" type="button" aria-label="Próxima leitura">›</button>
  </section>
  <svg class="connector-layer" id="connectorLayer" aria-hidden="true">
    <path class="connector-line" id="connectorLine" d=""></path>
  </svg>
  <aside class="detail-panel" id="normDetail" aria-live="polite" aria-label="Detalhamento da norma">
    <header class="detail-header">
      <div>
        <div class="detail-level" id="detailLevel"></div>
        <h2 class="detail-title" id="detailTitle"></h2>
      </div>
      <div>
        <button class="detail-close" id="detailClose" type="button" aria-label="Fechar detalhes">×</button>
        <div class="detail-status" id="detailStatus"></div>
      </div>
    </header>
    <div class="detail-body" id="detailBody"></div>
  </aside>
  <audio id="studyAudio" preload="metadata"></audio>
  <div class="loading" id="loading">Carregando cena 3D</div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { CSS2DObject, CSS2DRenderer } from 'three/addons/renderers/CSS2DRenderer.js';

    const container = document.querySelector('#scene');
    const loading = document.querySelector('#loading');
    const schemeNote = document.querySelector('#schemeNote');
    const connectorLayer = document.querySelector('#connectorLayer');
    const connectorLine = document.querySelector('#connectorLine');
    const normDetail = document.querySelector('#normDetail');
    const detailLevel = document.querySelector('#detailLevel');
    const detailTitle = document.querySelector('#detailTitle');
    const detailStatus = document.querySelector('#detailStatus');
    const detailBody = document.querySelector('#detailBody');
    const detailClose = document.querySelector('#detailClose');
    const studyPlayer = document.querySelector('#studyPlayer');
    const studyPlay = document.querySelector('#studyPlay');
    const studyNext = document.querySelector('#studyNext');
    const studyPlayIcon = document.querySelector('#studyPlayIcon');
    const studyAudioMode = document.querySelector('#studyAudioMode');
    const studyAudioTitle = document.querySelector('#studyAudioTitle');
    const studyAudio = document.querySelector('#studyAudio');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x21160c);
    scene.fog = new THREE.FogExp2(0x23170d, 0.05);

    const camera = new THREE.PerspectiveCamera(42, window.innerWidth / window.innerHeight, 0.1, 90);
    camera.position.set(5.6, 4.25, 8.8);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.08;
    renderer.shadowMap.enabled = false;
    renderer.shadowMap.type = THREE.PCFShadowMap;
    container.appendChild(renderer.domElement);

    const labelRenderer = new CSS2DRenderer();
    labelRenderer.setSize(window.innerWidth, window.innerHeight);
    labelRenderer.domElement.style.position = 'fixed';
    labelRenderer.domElement.style.inset = '0';
    labelRenderer.domElement.style.pointerEvents = 'none';
    document.body.appendChild(labelRenderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.06;
    controls.minDistance = 5.2;
    controls.maxDistance = 16;
    controls.maxPolarAngle = Math.PI * 0.49;
    controls.target.set(0, 1.9, 0);

    scene.add(new THREE.HemisphereLight(0xffdc9a, 0x140b05, 1.18));

    const keyLight = new THREE.DirectionalLight(0xffd27a, 2.55);
    keyLight.position.set(4.5, 7.5, 5.2);
    keyLight.castShadow = false;
    keyLight.shadow.mapSize.set(2048, 2048);
    keyLight.shadow.camera.near = 0.5;
    keyLight.shadow.camera.far = 22;
    keyLight.shadow.camera.left = -7;
    keyLight.shadow.camera.right = 7;
    keyLight.shadow.camera.top = 7;

    function buildPyramid(layers) {
      const radii = createRadii(layers.length);

      layers.forEach((layer, index) => {
        const palette = layerPalettes[layer.id] ?? layerPalettes.legal;
        const bottomRadius = radii[index];
        const topRadius = radii[index + 1];
        const y = index * (layerHeight + layerGap) + layerHeight / 2;

        const geometry = new THREE.CylinderGeometry(topRadius, bottomRadius, layerHeight, 4, 1, false);
        geometry.rotateY(Math.PI / 4);

        const material = new THREE.MeshStandardMaterial({
          color: palette.color,
          emissive: palette.emissive,
          roughness: 0.62,
          metalness: 0.12
        });

        const mesh = new THREE.Mesh(geometry, material);
        mesh.position.y = y;
        mesh.castShadow = false;
        mesh.receiveShadow = false;
        pyramid.add(mesh);

        const edgeLines = new THREE.LineSegments(
          new THREE.EdgesGeometry(geometry),
          new THREE.LineBasicMaterial({
            color: 0xffffff,
            transparent: true,
            opacity: 0.24
          })
        );
        edgeLines.position.copy(mesh.position);
        pyramid.add(edgeLines);

        createLayerInscriptions(layer, bottomRadius, topRadius, y, palette).forEach((inscription) => {
          pyramid.add(inscription);
        });

        const label = createLevelLabel(layer);
        const labelLayout = getLabelLayout(index);
        label.position.set(labelLayout.x, y + labelLayout.y, bottomRadius * labelLayout.zFactor + labelLayout.zPad);
        pyramid.add(label);
      });

      const bodyHeight = layers.length * (layerHeight + layerGap) - layerGap;
      const apexBaseRadius = radii[radii.length - 1];
      apexHeight = computeApexHeight(radii);
      createApexBlock(apexBaseRadius, bodyHeight + apexGap);
      return { bodyHeight, totalHeight: bodyHeight + apexGap + apexHeight };
    }

    function computeApexHeight(radii) {
      const topRadius = radii[radii.length - 1];
      const previousRadius = radii[radii.length - 2];
      const taper = Math.max(previousRadius - topRadius, 0.001);
      return topRadius * layerHeight / taper;
    }

    function createApexBlock(baseRadius, baseY) {
      const palette = layerPalettes.grundnorm;
      const geometry = new THREE.ConeGeometry(baseRadius, apexHeight, 4, 1, false);
      geometry.rotateY(Math.PI / 4);

      const material = new THREE.MeshStandardMaterial({
        color: palette.color,
        map: createSilverTexture(),
        emissive: palette.emissive,
        emissiveIntensity: 0.2,
        roughness: 0.28,
        metalness: 0.68
      });

      const mesh = new THREE.Mesh(geometry, material);
      mesh.position.y = baseY + apexHeight / 2;
      mesh.castShadow = false;
      mesh.receiveShadow = false;
      mesh.userData.detail = grundnormDetail;
      mesh.userData.anchor = createWorldAnchor(mesh, new THREE.Vector3(0, apexHeight / 2, 0), 18);
      apexAnchor = mesh.userData.anchor;
      pyramid.add(mesh);
      apexClickTargets.push(mesh);

      const hitMesh = new THREE.Mesh(
        new THREE.ConeGeometry(baseRadius * 1.2, apexHeight * 1.16, 4, 1, false),
        new THREE.MeshBasicMaterial({
          transparent: true,
          opacity: 0,
          depthWrite: false
        })
      );
      hitMesh.geometry.rotateY(Math.PI / 4);
      hitMesh.position.copy(mesh.position);
      hitMesh.userData.detail = grundnormDetail;
      hitMesh.userData.anchor = mesh.userData.anchor;
      pyramid.add(hitMesh);
      apexClickTargets.push(hitMesh);

      const edgeLines = new THREE.LineSegments(
        new THREE.EdgesGeometry(geometry),
        new THREE.LineBasicMaterial({
          color: 0xfff5cf,
          transparent: true,
          opacity: 0.46
        })
      );
      edgeLines.position.copy(mesh.position);
      pyramid.add(edgeLines);

      [
        { face: 'right', text: 'GRUND\nNORM', width: 0.68, height: 0.22, yOffset: -0.08 }
      ].forEach((segment) => {
        const texture = createInscriptionTexture(segment.text, palette.inscription, palette.inscriptionStroke);
        const inscription = new THREE.Mesh(
          new THREE.PlaneGeometry(segment.width, segment.height),
          new THREE.MeshBasicMaterial({
            map: texture,
            transparent: true,
            opacity: 0.96,
            depthWrite: false,
            side: THREE.DoubleSide,
            toneMapped: false
          })
        );
        const placement = getFacePlacement(segment.face, baseRadius, 0, baseY + apexHeight / 2, segment.yOffset, apexHeight);
        inscription.position.copy(placement.position);
        inscription.quaternion.copy(placement.quaternion);
        inscription.renderOrder = 2;
        pyramid.add(inscription);
      });
    }

    function createLayerInscriptions(layer, bottomRadius, topRadius, centerY, palette) {
      const segments = getInscriptionSegments(layer.id, layer.title);

      return segments.map((segment) => {
        const texture = createInscriptionTexture(segment.text, palette.inscription, palette.inscriptionStroke);
        const material = new THREE.MeshBasicMaterial({
          map: texture,
          transparent: true,
          opacity: segment.opacity ?? 0.98,
          depthWrite: false,
          side: THREE.DoubleSide,
          toneMapped: false
        });
        const mesh = new THREE.Mesh(
          new THREE.PlaneGeometry(segment.width, segment.height ?? 0.24),
          material
        );
        const placement = getFacePlacement(segment.face, bottomRadius, topRadius, centerY, segment.yOffset ?? 0.04);
        mesh.position.copy(placement.position);
        mesh.quaternion.copy(placement.quaternion);
        mesh.renderOrder = 2;
        return mesh;
      });
    }

    function getInscriptionSegments(layerId, title) {
      const defaults = [{ face: 'right', text: title.toUpperCase(), width: 2.1 }];
      const byLayer = {
        infralegal: [
          { face: 'right', text: 'ATOS INFRALEGAIS', width: 2.72, height: 0.3, yOffset: -0.02 }
        ],
        legal: [
          { face: 'right', text: 'PLANO LEGAL', width: 2.42, height: 0.32, yOffset: -0.02 }
        ],
        supralegal: [
          { face: 'right', text: 'TRATADO DOS DIREITOS\nHUMANOS SUPRALEGAIS', width: 2.92, height: 0.44, yOffset: -0.02 }
        ],
        constitucional: [
          { face: 'right', text: 'BLOCO\nCONSTITUCIONAL', width: 1.92, height: 0.36, yOffset: -0.17 }
        ]
      };

      return byLayer[layerId] ?? defaults;
    }

    function getFacePlacement(face, bottomRadius, topRadius, centerY, yOffset, sectionHeight = layerHeight) {
      const localY = centerY + yOffset;
      const layerBottomY = centerY - sectionHeight / 2;
      const t = THREE.MathUtils.clamp((localY - layerBottomY) / sectionHeight, 0, 1);
      const radius = THREE.MathUtils.lerp(bottomRadius, topRadius, t);
      const faceDistance = radius / Math.SQRT2;
      const slope = (topRadius - bottomRadius) / (sectionHeight * Math.SQRT2);
      const outwardOffset = 0.018;
      let position;
      let right;
      let up;
      let normal;

      if (face === 'right') {
        right = new THREE.Vector3(0, 0, -1);
        up = new THREE.Vector3(slope, 1, 0).normalize();
        normal = new THREE.Vector3(1, -slope, 0).normalize();
        position = new THREE.Vector3(faceDistance, localY, 0);
      } else {
        right = new THREE.Vector3(1, 0, 0);
        up = new THREE.Vector3(0, 1, slope).normalize();
        normal = new THREE.Vector3(0, -slope, 1).normalize();
        position = new THREE.Vector3(0, localY, faceDistance);
      }

      const matrix = new THREE.Matrix4().makeBasis(right, up, normal);
      const quaternion = new THREE.Quaternion().setFromRotationMatrix(matrix);
      position.addScaledVector(normal, outwardOffset);
      return { position, quaternion };
    }

    function createInscriptionTexture(text, color, strokeColor) {
      const canvas = document.createElement('canvas');
      canvas.width = 1024;
      canvas.height = 256;
      const context = canvas.getContext('2d');
      context.clearRect(0, 0, canvas.width, canvas.height);
      context.textAlign = 'center';
      context.textBaseline = 'middle';
      context.lineJoin = 'round';
      const lines = text.split('\n');

      let fontSize = 78;
      do {
        context.font = `900 ${fontSize}px Inter, Arial, sans-serif`;
        const widestLine = Math.max(...lines.map((line) => context.measureText(line).width));
        const totalHeight = lines.length * fontSize * 1.08;
        fontSize -= 3;
        if (widestLine <= canvas.width * 0.84 && totalHeight <= canvas.height * 0.72) {
          break;
        }
      } while (fontSize > 34);

      context.font = `900 ${fontSize + 3}px Inter, Arial, sans-serif`;
      context.strokeStyle = strokeColor;
      context.lineWidth = 12;
      context.fillStyle = color;
      const lineHeight = (fontSize + 3) * 1.08;
      const firstLineY = canvas.height / 2 - ((lines.length - 1) * lineHeight) / 2;
      lines.forEach((line, index) => {
        const y = firstLineY + index * lineHeight;
        context.strokeText(line, canvas.width / 2, y);
        context.fillText(line, canvas.width / 2, y);
      });

      const texture = new THREE.CanvasTexture(canvas);
      texture.colorSpace = THREE.SRGBColorSpace;
      texture.anisotropy = renderer.capabilities.getMaxAnisotropy();
      texture.needsUpdate = true;
      return texture;
    }

    function createSilverTexture() {
      const canvas = document.createElement('canvas');
      canvas.width = 512;
      canvas.height = 512;
      const context = canvas.getContext('2d');
      const gradient = context.createLinearGradient(0, 0, canvas.width, canvas.height);
      gradient.addColorStop(0, '#fffdf2');
      gradient.addColorStop(0.26, '#d9d6ca');
      gradient.addColorStop(0.5, '#f5f2e9');
      gradient.addColorStop(0.76, '#aaa79c');
      gradient.addColorStop(1, '#f9f7ef');
      context.fillStyle = gradient;
      context.fillRect(0, 0, canvas.width, canvas.height);

      for (let i = 0; i < 95; i++) {
        const y = (i * 37) % canvas.height;
        const alpha = 0.05 + ((i * 13) % 9) / 180;
        context.strokeStyle = i % 2 === 0
          ? `rgba(255, 255, 255, ${alpha})`
          : `rgba(86, 82, 73, ${alpha})`;
        context.lineWidth = 1 + (i % 3);
        context.beginPath();
        context.moveTo(-80, y);
        context.lineTo(canvas.width + 80, y + Math.sin(i) * 28);
        context.stroke();
      }

      const texture = new THREE.CanvasTexture(canvas);
      texture.colorSpace = THREE.SRGBColorSpace;
      texture.anisotropy = renderer.capabilities.getMaxAnisotropy();
      texture.needsUpdate = true;
      return texture;
    }

    function getLabelLayout(index) {
      const compactLayout = [
        { x: 0.02, y: -0.12, zFactor: 0.72, zPad: 0.76 },
        { x: 0.06, y: -0.14, zFactor: 0.62, zPad: 0.48 },
        { x: 0.02, y: 0.2, zFactor: 0.6, zPad: 0.39 },
        { x: 0.02, y: 0.14, zFactor: 0.62, zPad: 0.36 }
      ];
      const wideLayout = [
        { x: 0.02, y: 0.34, zFactor: 0.72, zPad: 0.76 },
        { x: 0.06, y: 0.24, zFactor: 0.6, zPad: 0.45 },
        { x: 0.02, y: 0.18, zFactor: 0.6, zPad: 0.39 },
        { x: 0.02, y: 0.14, zFactor: 0.62, zPad: 0.36 }
      ];

      return (isCompactView ? compactLayout : wideLayout)[index] ??
        { x: index % 2 === 0 ? -0.26 : 0.38, y: 0.05, zFactor: 0.58, zPad: 0.4 };
    }

    function createRadii(layerCount) {
      const bottom = 3.75;
      const top = layerCount <= 3 ? 0.66 : 0.42;
      const radii = [];

      for (let i = 0; i <= layerCount; i++) {
        const t = i / layerCount;
        radii.push(THREE.MathUtils.lerp(bottom, top, Math.pow(t, 0.92)));
      }

      return radii;
    }

    function clearPyramid() {
      apexClickTargets.length = 0;
      apexAnchor = null;
      normButtonById.clear();

      while (pyramid.children.length > 0) {
        disposeObject(pyramid.children.pop());
      }
    }

    function disposeObject(object) {
      object.traverse((child) => {
        child.element?.remove();
        child.geometry?.dispose();

        if (Array.isArray(child.material)) {
          child.material.forEach(disposeMaterial);
        } else {
          disposeMaterial(child.material);
        }
      });
    }

    function disposeMaterial(material) {
      if (!material) {
        return;
      }

      material.map?.dispose();
      material.alphaMap?.dispose();
      material.dispose();
    }

    function animate() {
      const elapsed = (performance.now() - startedAt) / 1000;

      pyramid.rotation.y = Math.sin(elapsed * 0.16) * 0.08;
      apexAura.position.y = apexAura.userData.baseY + Math.sin(elapsed * 1.2) * 0.025;
      controls.update();
      apexAura.userData.outerRays.rotation.z = elapsed * 0.18;
      apexAura.userData.innerRays.rotation.z = -elapsed * 0.28;
      apexAura.userData.halo.rotation.z = elapsed * 0.08;
      apexLight.intensity = 12 + Math.sin(elapsed * 2.4) * 2.2;

      renderer.render(scene, camera);
      labelRenderer.render(scene, camera);
      updateConnector();
      requestAnimationFrame(animate);
    }

    function resize() {
      const width = window.innerWidth;
      const height = window.innerHeight;
      camera.aspect = width / height;
      camera.updateProjectionMatrix();
      renderer.setSize(width, height);
      labelRenderer.setSize(width, height);
      frameCamera();
      updateConnector();
    }

    function frameCamera() {
      const aspect = window.innerWidth / window.innerHeight;
      isCompactView = aspect < 0.68;

      if (isCompactView) {
        camera.fov = 42;
        camera.position.set(2.15, 4.05, 11.4);
        controls.target.set(0.02, 1.45, 0);
      } else if (aspect < 1.05) {
        camera.fov = 45;
        camera.position.set(4.2, 4.25, 10.7);
        controls.target.set(0, 1.85, 0);
      } else {
        camera.fov = 42;
        camera.position.set(5.6, 4.25, 8.8);
        controls.target.set(0, 1.9, 0);
      }

      camera.aspect = aspect;
      camera.updateProjectionMatrix();
      controls.update();
      applyResponsiveSceneScale();
    }

    function applyResponsiveSceneScale() {
      const pyramidScale = isCompactView ? 0.82 : 1;
      const auraScale = isCompactView ? 0.54 : 0.8;
      sceneLift = isCompactView ? 1.08 : 0;
      const apexWorldY = sceneLift + totalHeight * pyramidScale;

      pyramid.scale.setScalar(pyramidScale);
      pyramid.position.y = sceneLift;
      apexAura.scale.setScalar(auraScale);
      apexAura.userData.baseY = apexWorldY + 0.04;
      apexAura.position.set(0, apexAura.userData.baseY, 0);
      apexLight.position.set(0, apexWorldY + 0.26, 0.35);
    }

    function createLevelLabel(layer) {
      const div = document.createElement('div');
      div.className = 'label level-label';
      div.dataset.layer = layer.id;

      const stack = document.createElement('div');
      stack.className = 'norm-stack';
      div.appendChild(stack);

      layer.norms.forEach((norm) => {
        const button = document.createElement('button');
        button.className = 'norm-chip';
        button.type = 'button';
        button.textContent = norm.short ?? norm.name;
        button.setAttribute('aria-pressed', 'false');
        normButtonById.set(norm.id, button);
        button.addEventListener('pointerdown', (event) => {
          event.stopPropagation();
        });
        button.addEventListener('click', (event) => {
          event.preventDefault();
          event.stopPropagation();
          const detail = { ...norm, levelTitle: layer.title };
          openNormDetail(detail, button);
          playAudioItem(detail, { guide: false });
        });
        stack.appendChild(button);
      });

      return new CSS2DObject(div);
    }

    function openNormDetail(norm, button, anchor = button) {
      if (activeNormButton) {
        activeNormButton.classList.remove('active');
        activeNormButton.setAttribute('aria-pressed', 'false');
      }

      activeNormButton = button ?? null;
      activeNormAnchor = anchor ?? button;

      if (activeNormButton) {
        activeNormButton.classList.add('active');
        activeNormButton.setAttribute('aria-pressed', 'true');
      }

      detailLevel.textContent = norm.levelTitle;
      detailTitle.textContent = norm.name;
      detailStatus.textContent = norm.status;
      detailStatus.dataset.state = norm.statusKind;
      detailBody.replaceChildren(...norm.sections.map(createDetailSection));

      normDetail.classList.add('open');
      connectorLayer.classList.add('active');
      requestAnimationFrame(updateConnector);
    }

    function closeNormDetail() {
      if (activeNormButton) {
        activeNormButton.classList.remove('active');
        activeNormButton.setAttribute('aria-pressed', 'false');
      }

      activeNormButton = null;
      activeNormAnchor = null;
      normDetail.classList.remove('open');
      connectorLayer.classList.remove('active');
    }

    function createStudySequence(scheme) {
      const normsTopDown = scheme.layers
        .slice()
        .reverse()
        .flatMap((layer) => layer.norms.map((norm) => ({ ...norm, levelTitle: layer.title })));

      return [overviewStudyItem, grundnormDetail, ...normsTopDown];
    }

    function toggleStudyGuide() {
      if (isCurrentAudioPlaying()) {
        pauseCurrentAudio();
        return;
      }

      if (isGuidePlaying && currentAudioItem && !isAudioFallback && studyAudio.src && !studyAudio.ended) {
        studyAudio.play().catch(() => handleAudioPlayBlocked(currentAudioItem));
        return;
      }

      if (isGuidePlaying && currentAudioItem && isAudioFallback && speechSynthesis.paused) {
        speechSynthesis.resume();
        updateAudioControls();
        return;
      }

      playGuideIndex(activeStudyIndex >= 0 ? activeStudyIndex : 0);
    }

    function playNextStudyItem() {
      const currentIndex = currentAudioItem
        ? studySequence.findIndex((item) => item.id === currentAudioItem.id)
        : -1;
      const nextIndex = currentIndex >= 0 ? currentIndex + 1 : 0;
      playGuideIndex(nextIndex >= studySequence.length ? 0 : nextIndex);
    }

    function playGuideIndex(index) {
      if (index >= studySequence.length) {
        completeGuide();
        return;
      }

      isGuidePlaying = true;
      activeStudyIndex = index;
      const item = studySequence[index];
      openStudyItem(item);
      playAudioItem(item, { guide: true, index });
    }

    function openStudyItem(item) {
      if (item.isOverview) {
        closeNormDetail();
        return;
      }

      if (item.id === grundnormDetail.id) {
        openNormDetail(grundnormDetail, null, apexAnchor);
        return;
      }

      const button = normButtonById.get(item.id) ?? null;
      openNormDetail(item, button);
    }

    function playAudioItem(item, { guide = false, index = null } = {}) {
      stopCurrentAudio();
      currentAudioItem = item;
      isGuidePlaying = guide;
      activeStudyIndex = index ?? studySequence.findIndex((entry) => entry.id === item.id);
      isAudioFallback = false;
      studyAudioMode.textContent = guide ? 'Estudo guiado' : 'Leitura da norma';
      studyAudioTitle.textContent = item.name;

      suppressAudioError = false;
      studyAudio.src = getAudioPath(item);
      studyAudio.load();
      studyAudio.play().catch(() => handleAudioPlayBlocked(item));
      updateAudioControls();
    }

    function pauseCurrentAudio() {
      if (isAudioFallback && speechSynthesis.speaking) {
        speechSynthesis.pause();
      } else {
        studyAudio.pause();
      }

      updateAudioControls();
    }

    function stopCurrentAudio() {
      if (speechSynthesis.speaking || speechSynthesis.pending) {
        speechSynthesis.cancel();
      }

      syntheticUtterance = null;
      suppressAudioError = true;
      studyAudio.pause();
      studyAudio.removeAttribute('src');
      studyAudio.load();
      suppressAudioError = false;
    }

    function handleAudioEnded() {
      if (isGuidePlaying) {
        playGuideIndex(activeStudyIndex + 1);
        return;
      }

      studyAudioMode.textContent = 'Áudio guia';
      studyAudioTitle.textContent = currentAudioItem ? `Leitura concluída: ${currentAudioItem.name}` : 'Ouvir estudo completo';
      updateAudioControls();
    }

    function handleAudioError() {
      if (!currentAudioItem || suppressAudioError || isAudioFallback) {
        return;
      }

      speakFallback(currentAudioItem);
    }

    function handleAudioPlayBlocked(item) {
      studyAudioMode.textContent = isGuidePlaying ? 'Estudo guiado' : 'Leitura da norma';
      studyAudioTitle.textContent = `Leitura pronta: ${item.name}`;
      updateAudioControls();
    }

    function speakFallback(item) {
      if (!('speechSynthesis' in window)) {
        handleAudioUnavailable();
        return;
      }

      isAudioFallback = true;
      if (speechSynthesis.speaking || speechSynthesis.pending) {
        speechSynthesis.cancel();
      }

      syntheticUtterance = new SpeechSynthesisUtterance(buildNarrationText(item));
      syntheticUtterance.lang = 'pt-BR';
      syntheticUtterance.rate = 0.9;
      syntheticUtterance.pitch = 0.72;
      syntheticUtterance.voice = chooseFallbackVoice();
      syntheticUtterance.onend = handleAudioEnded;
      syntheticUtterance.onerror = handleAudioUnavailable;
      speechSynthesis.speak(syntheticUtterance);
      updateAudioControls();
    }

    function chooseFallbackVoice() {
      const voices = speechSynthesis.getVoices();
      return voices.find((voice) => voice.lang === 'pt-BR' && /antonio|male|mascul|google/i.test(voice.name)) ??
        voices.find((voice) => voice.lang === 'pt-BR') ??
        voices.find((voice) => voice.lang.startsWith('pt')) ??
        null;
    }

    function completeGuide() {
      isGuidePlaying = false;
      activeStudyIndex = -1;
      currentAudioItem = null;
      studyAudioMode.textContent = 'Áudio guia';
      studyAudioTitle.textContent = 'Estudo completo concluído';
      updateAudioControls();
    }

    function handleAudioUnavailable() {
      isGuidePlaying = false;
      studyAudioMode.textContent = 'Áudio guia';
      studyAudioTitle.textContent = currentAudioItem ? `Áudio indisponível: ${currentAudioItem.name}` : 'Áudio indisponível';
      updateAudioControls();
    }

    function getAudioPath(item) {
      return `${AUDIO_BASE_PATH}${item.id}.${AUDIO_EXTENSION}`;
    }

    function buildNarrationText(item) {
      if (item.narration) {
        return toSpokenText(item.narration);
      }

      const intro = `${toSpokenText(item.name)}. ${toSpokenText(item.levelTitle)}. Situação: ${toSpokenText(item.status)}.`;
      const body = item.sections
        .map((section) => [
          section.title ? `${toSpokenText(section.title)}.` : '',
          ...section.items.map(toSpokenText)
        ].filter(Boolean).join(' '))
        .join(' ');

      return `${intro} ${body}`;
    }

    function toSpokenText(text) {
      return text
        .replace(/\bCF\b/g, 'Constituição Federal')
        .replaceAll('TIDH', 'Tratado Internacional de Direitos Humanos')
        .replaceAll('art. 5º, §3º', 'artigo quinto, parágrafo terceiro')
        .replaceAll('art. 5º', 'artigo quinto')
        .replaceAll('arts.', 'artigos')
        .replaceAll('art.', 'artigo')
        .replaceAll('§2º', 'parágrafo segundo')
        .replaceAll('§3º', 'parágrafo terceiro')
        .replaceAll('RE 466.343/SP', 'Recurso Extraordinário quatrocentos e sessenta e seis mil trezentos e quarenta e três, São Paulo');
    }

    function isCurrentAudioPlaying() {
      if (isAudioFallback) {
        return speechSynthesis.speaking && !speechSynthesis.paused;
      }

      return !studyAudio.paused && !studyAudio.ended;
    }

    function updateAudioControls() {
      const isPlaying = isCurrentAudioPlaying();
      studyPlayer.dataset.state = isPlaying ? 'playing' : 'idle';
      studyPlayIcon.textContent = isPlaying ? '❚❚' : '▶';
      studyPlay.setAttribute('aria-label', isPlaying ? 'Pausar leitura' : 'Reproduzir leitura guiada');

      if (!currentAudioItem && studyAudioTitle.textContent.trim() === '') {
        studyAudioTitle.textContent = 'Ouvir estudo completo';
      }
    }

    function handleScenePointerDown(event) {
      scenePointer.id = event.pointerId;
      scenePointer.x = event.clientX;
      scenePointer.y = event.clientY;
      scenePointer.time = performance.now();
    }

    function handleScenePointerUp(event) {
      if (scenePointer.id !== event.pointerId) {
        return;
      }

      const moved = Math.hypot(event.clientX - scenePointer.x, event.clientY - scenePointer.y);
      const elapsed = performance.now() - scenePointer.time;
      scenePointer.id = null;

      if (moved > 8 || elapsed > 650) {
        return;
      }

      const apex = getApexIntersection(event);
      if (apex) {
        openNormDetail(apex.object.userData.detail, null, apex.object.userData.anchor);
        playAudioItem(apex.object.userData.detail, { guide: false });
      } else if (isNearApex(event)) {
        openNormDetail(grundnormDetail, null, apexAnchor);
        playAudioItem(grundnormDetail, { guide: false });
      }
    }

    function handleScenePointerMove(event) {
      renderer.domElement.style.cursor = getApexIntersection(event) || isNearApex(event) ? 'pointer' : '';
    }

    function getApexIntersection(event) {
      if (apexClickTargets.length === 0) {
        return null;
      }

      const rect = renderer.domElement.getBoundingClientRect();
      pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      pointer.y = -(((event.clientY - rect.top) / rect.height) * 2 - 1);
      raycaster.setFromCamera(pointer, camera);
      return raycaster.intersectObjects(apexClickTargets, false)[0] ?? null;
    }

    function isNearApex(event) {
      if (!apexAnchor) {
        return false;
      }

      const rect = apexAnchor.getBoundingClientRect();
      const centerX = rect.left + rect.width / 2;
      const centerY = rect.top + rect.height / 2;
      const radius = isCompactView ? 58 : 38;
      return Math.hypot(event.clientX - centerX, event.clientY - centerY) <= radius;
    }

    function createWorldAnchor(object, localPoint, size) {
      return {
        getBoundingClientRect() {
          const canvasRect = renderer.domElement.getBoundingClientRect();
          const worldPoint = object.localToWorld(localPoint.clone());
          const screenPoint = worldPoint.project(camera);
          const x = canvasRect.left + (screenPoint.x * 0.5 + 0.5) * canvasRect.width;
          const y = canvasRect.top + (-screenPoint.y * 0.5 + 0.5) * canvasRect.height;
          const half = size / 2;

          return {
            left: x - half,
            right: x + half,
            top: y - half,
            bottom: y + half,
            width: size,
            height: size
          };
        }
      };
    }

    function createDetailSection(section) {
      const wrapper = document.createElement('section');
      wrapper.className = 'detail-section';

      if (section.title) {
        const title = document.createElement('h3');
        title.textContent = section.title;
        wrapper.appendChild(title);
      }

      if (section.items.length === 1) {
        const paragraph = document.createElement('p');
        paragraph.textContent = section.items[0];
        wrapper.appendChild(paragraph);
      } else {
        const list = document.createElement('ul');
        section.items.forEach((item) => {
          const li = document.createElement('li');
          li.textContent = item;
          list.appendChild(li);
        });
        wrapper.appendChild(list);
      }

      return wrapper;
    }

    function updateConnector() {
      if (!activeNormAnchor || !normDetail.classList.contains('open')) {
        return;
      }

      const anchorRect = activeNormAnchor.getBoundingClientRect();
      const panelRect = normDetail.getBoundingClientRect();
      const isPanelBelow = panelRect.top > anchorRect.bottom;
      const anchorCenterX = anchorRect.left + anchorRect.width / 2;
      const x2 = panelRect.left + (panelRect.left > anchorCenterX ? 18 : panelRect.width - 18);
      const y2 = isPanelBelow ? panelRect.top + 8 : panelRect.top + Math.min(panelRect.height * 0.34, 110);
      const { x: x1, y: y1 } = getNearestCorner(anchorRect, x2, y2);
      const controlX = x1 + (x2 - x1) * 0.58;
      const controlY = y1 + (y2 - y1) * 0.28 - 28;

      connectorLine.setAttribute(
        'd',
        `M ${x1.toFixed(1)} ${y1.toFixed(1)} Q ${controlX.toFixed(1)} ${controlY.toFixed(1)} ${x2.toFixed(1)} ${y2.toFixed(1)}`
      );
    }

    function getNearestCorner(rect, targetX, targetY) {
      const corners = [
        { x: rect.left, y: rect.top },
        { x: rect.right, y: rect.top },
        { x: rect.right, y: rect.bottom },
        { x: rect.left, y: rect.bottom }
      ];

      return corners.reduce((nearest, corner) => {
        const nearestDistance = Math.hypot(nearest.x - targetX, nearest.y - targetY);
        const cornerDistance = Math.hypot(corner.x - targetX, corner.y - targetY);
        return cornerDistance < nearestDistance ? corner : nearest;
      });
    }

    function createApexAura() {
      const group = new THREE.Group();
      const corona = new THREE.Group();
      corona.rotation.x = -Math.PI / 2;
      group.add(corona);
      group.userData.corona = corona;

      const halo = new THREE.Mesh(
        new THREE.RingGeometry(0.42, 0.62, 96),
        new THREE.MeshBasicMaterial({
          color: 0xffce7a,
          side: THREE.DoubleSide,
          transparent: true,
          opacity: 0.34,
          blending: THREE.AdditiveBlending,
          depthWrite: false
        })
      );
      corona.add(halo);
      group.userData.halo = halo;

      const outerRays = createRayBurst(44, 0.54, 1.72, 0xffd88a, 0.52);
      corona.add(outerRays);
      group.userData.outerRays = outerRays;

      const innerRays = createRayBurst(28, 0.28, 1.08, 0xfff1ba, 0.38);
      corona.add(innerRays);
      group.userData.innerRays = innerRays;

      const vertexGlow = new THREE.Mesh(
        new THREE.SphereGeometry(0.055, 24, 12),
        new THREE.MeshBasicMaterial({
          color: 0xfff1ba,
          transparent: true,
          opacity: 0.9,
          blending: THREE.AdditiveBlending,
          depthWrite: false
        })
      );
      group.add(vertexGlow);

      return group;
    }

    function createRayBurst(count, innerRadius, outerRadius, color, opacity) {
      const positions = [];

      for (let i = 0; i < count; i++) {
        const angle = (i / count) * Math.PI * 2;
        const lengthJitter = 0.78 + ((i * 17) % 11) / 30;
        const start = innerRadius;
        const end = outerRadius * lengthJitter;
        positions.push(Math.cos(angle) * start, Math.sin(angle) * start, 0);
        positions.push(Math.cos(angle) * end, Math.sin(angle) * end, 0);
      }

      const geometry = new THREE.BufferGeometry();
      geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));

      return new THREE.LineSegments(
        geometry,
        new THREE.LineBasicMaterial({
          color,
          transparent: true,
          opacity,
          blending: THREE.AdditiveBlending,
          depthWrite: false
        })
      );
    }

    function addDesertDunes() {
      const duneGroup = new THREE.Group();
      scene.add(duneGroup);

      [
        { y: 0.18, z: -6.7, width: 17, height: 0.62, color: 0x5b3b1b, opacity: 0.24, phase: 0.2 },
        { y: 0.42, z: -7.8, width: 20, height: 0.86, color: 0x7a5527, opacity: 0.18, phase: 1.8 },
        { y: 0.72, z: -9.3, width: 24, height: 1.08, color: 0xa07334, opacity: 0.12, phase: 3.2 }
      ].forEach((spec) => {
        duneGroup.add(createDuneRidge(spec));
      });

      for (let row = 0; row < 10; row++) {
        const points = [];
        const baseZ = -5.1 + row * 0.74;
        for (let step = 0; step <= 96; step++) {
          const t = step / 96;
          const x = THREE.MathUtils.lerp(-8.8, 8.8, t);
          const z = baseZ + Math.sin(t * Math.PI * 2.2 + row * 0.62) * 0.16;
          points.push(x, 0.012 + row * 0.0005, z);
        }

        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute('position', new THREE.Float32BufferAttribute(points, 3));
        const line = new THREE.Line(
          geometry,
          new THREE.LineBasicMaterial({
            color: row % 2 === 0 ? 0xb7833c : 0x5a371a,
            transparent: true,
            opacity: row < 4 ? 0.12 : 0.07,
            depthWrite: false
          })
        );
        duneGroup.add(line);
      }
    }

    function createDuneRidge({ y, z, width, height, color, opacity, phase }) {
      const shape = new THREE.Shape();
      shape.moveTo(-width / 2, -0.24);

      for (let step = 0; step <= 72; step++) {
        const t = step / 72;
        const x = THREE.MathUtils.lerp(-width / 2, width / 2, t);
        const wave = Math.sin(t * Math.PI * 2 + phase) * 0.08 + Math.sin(t * Math.PI * 4.6 + phase) * 0.04;
        const crest = Math.sin(t * Math.PI) * height + wave;
        shape.lineTo(x, crest);
      }

      shape.lineTo(width / 2, -0.24);
      shape.lineTo(-width / 2, -0.24);

      const mesh = new THREE.Mesh(
        new THREE.ShapeGeometry(shape),
        new THREE.MeshBasicMaterial({
          color,
          transparent: true,
          opacity,
          side: THREE.DoubleSide,
          depthWrite: false
        })
      );
      mesh.position.set(0, y, z);
      mesh.renderOrder = -2;
      return mesh;
    }
  </script>
